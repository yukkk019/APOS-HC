<!DOCTYPE html>
<html lang="ja">
<head>
  <!--
    APOS-HC 検証専用画面。
    保存結果の可視化・回数確認・one-hot整合性チェックを行う。
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APOS-HC 検証ビュー</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 16px;
      background: #f7f9fc;
      color: #1f2937;
    }
    .card {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    input, button {
      padding: 6px 10px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #fff;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
    }
    pre {
      background: #111827;
      color: #f9fafb;
      padding: 10px;
      border-radius: 6px;
      overflow: auto;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .error {
      color: #b91c1c;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>APOS-HC データ検証</h1>

  <div class="card">
    <div class="row">
      <button id="btnLatest">最新50件を表示</button>
      <input id="limitInput" type="number" min="1" max="500" value="50">
      <button id="btnLatestCustom">件数指定で表示</button>
    </div>
    <div class="row">
      <input id="userIdInput" type="text" placeholder="user_id 例: 001_1001">
      <button id="btnUserRows">このユーザーの全行</button>
      <button id="btnUserCsv">このユーザーをCSV保存</button>
      <button id="btnRoundStatus">このユーザーの回数状況</button>
      <button id="btnConsistency">one-hot整合性チェック</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="card">
    <h2>表形式</h2>
    <div id="tableRoot">データ未取得</div>
  </div>

  <div class="card">
    <h2>CSVカラム説明</h2>
    <div id="guideRoot">データ未取得</div>
  </div>

  <div class="card">
    <h2>JSON</h2>
    <pre id="jsonRoot">データ未取得</pre>
  </div>

  <script>
    function resolveApiBase() {
      try {
        const qp = new URLSearchParams(window.location.search || "");
        const fromQuery = (qp.get("apiBase") || "").trim();
        if (fromQuery) return fromQuery.replace(/\/+$/, "");
      } catch (_) {}

      try {
        const o = window.location.origin;
        if (o && o !== "null") return o.replace(/\/+$/, "");
      } catch (_) {}

      return "http://127.0.0.1:8010";
    }
    const apiBase = resolveApiBase();
    const statusEl = document.getElementById("status");
    const tableRoot = document.getElementById("tableRoot");
    const guideRoot = document.getElementById("guideRoot");
    const jsonRoot = document.getElementById("jsonRoot");
    const userIdInput = document.getElementById("userIdInput");
    const limitInput = document.getElementById("limitInput");

    function setStatus(message, isError = false) {
      statusEl.textContent = `[API: ${apiBase}] ${message}`;
      statusEl.className = isError ? "error" : "";
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        tableRoot.innerHTML = "データがありません。";
        return;
      }
      const columns = Object.keys(rows[0]);
      let html = "<table><thead><tr>";
      columns.forEach((col) => {
        html += `<th>${col}</th>`;
      });
      html += "</tr></thead><tbody>";
      rows.forEach((row) => {
        html += "<tr>";
        columns.forEach((col) => {
          const val = row[col] == null ? "" : String(row[col]);
          html += `<td>${val}</td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table>";
      tableRoot.innerHTML = html;
    }

    function toLabel(text) {
      return String(text || "")
        .replace(/_/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function firstNonEmpty(rows, col) {
      for (const row of rows) {
        const val = row[col];
        if (val !== null && val !== undefined && String(val).trim() !== "") {
          return val;
        }
      }
      return "";
    }

    function inferKind(col, rows) {
      const vals = rows.map((r) => r[col]).filter((v) => v !== null && v !== undefined && String(v).trim() !== "");
      if (vals.length === 0) return "不明";
      const asText = vals.map((v) => String(v).trim());
      const isBinary = asText.every((v) => v === "0" || v === "1");
      if (isBinary) return "one-hot(0/1)";
      const isNumber = asText.every((v) => !Number.isNaN(Number(v)));
      if (isNumber) return "数値";
      return "文字列";
    }

    function inferDescription(col, kind) {
      const fixed = {
        updated_at: "更新日時",
        last_saved_kind: "保存種別（draft/final）",
        final_submitted_at: "確定日時",
        user_id: "ユーザーID（office_id_personal_id）",
        assessment_round: "アセスメント回（1/2/3）",
        office_id: "事業所ID",
        personal_id: "個人ID"
      };
      if (fixed[col]) return fixed[col];
      if (/_filename$/i.test(col)) return "画像ファイル名";
      if (/_year$|_month$|_day$/i.test(col)) return "日付の分割値";
      if (/_count$/i.test(col)) return "件数/回数";
      if (/_note$|_detail$|_reason$|_other$/i.test(col)) return "自由記述テキスト";
      if (kind === "one-hot(0/1)") {
        const m = col.match(/^(.*)_([^_]+)$/);
        if (m) {
          return `${toLabel(m[1])} の選択肢フラグ（${m[2]}=1）`;
        }
        return "選択肢フラグ（1=該当）";
      }
      return `${toLabel(col)} の値`;
    }

    function buildGuideRows(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return [];
      }
      const columns = Object.keys(rows[0]);
      return columns.map((col) => {
        const kind = inferKind(col, rows);
        const desc = inferDescription(col, kind);
        const sample = firstNonEmpty(rows, col);
        return {
          column_name: col,
          kind: kind,
          description: desc,
          sample_value: sample == null ? "" : String(sample),
        };
      });
    }

    function renderGuide(rows) {
      const guideRows = buildGuideRows(rows);
      if (guideRows.length === 0) {
        guideRoot.innerHTML = "データがありません。";
        return;
      }
      let html = "<table><thead><tr><th>カラム名</th><th>種別</th><th>説明</th><th>例値</th></tr></thead><tbody>";
      guideRows.forEach((row) => {
        html += `<tr><td>${row.column_name}</td><td>${row.kind}</td><td>${row.description}</td><td>${row.sample_value}</td></tr>`;
      });
      html += "</tbody></table>";
      guideRoot.innerHTML = html;
    }

    function toCsv(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return "";
      }
      const columns = Object.keys(rows[0]);
      const escapeCsv = (value) => {
        const text = value == null ? "" : String(value);
        if (/[",\n\r]/.test(text)) {
          return `"${text.replace(/"/g, '""')}"`;
        }
        return text;
      };
      const header = columns.join(",");
      const body = rows
        .map((row) => columns.map((col) => escapeCsv(row[col])).join(","))
        .join("\n");
      return `${header}\n${body}`;
    }

    function downloadCsv(filename, content) {
      const bom = "\uFEFF"; // Excel 文字化け対策
      const blob = new Blob([bom + content], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    async function fetchAndRender(path) {
      setStatus("取得中...");
      try {
        const res = await fetch(`${apiBase}${path}`);
        const data = await res.json();
        if (!res.ok) {
          setStatus(`取得失敗: HTTP ${res.status}`, true);
          jsonRoot.textContent = JSON.stringify(data, null, 2);
          tableRoot.innerHTML = "エラー";
          guideRoot.innerHTML = "エラー";
          return;
        }
        setStatus("取得成功");
        jsonRoot.textContent = JSON.stringify(data, null, 2);
        const rows = Array.isArray(data.rows)
          ? data.rows
          : (Array.isArray(data) ? data : [data]);
        renderTable(rows);
        renderGuide(rows);
      } catch (error) {
        setStatus(`通信失敗: ${error}`, true);
      }
    }

    document.getElementById("btnLatest").addEventListener("click", () => {
      fetchAndRender("/verify/latest?limit=50");
    });

    document.getElementById("btnLatestCustom").addEventListener("click", () => {
      const limit = Math.max(1, Math.min(500, Number(limitInput.value) || 50));
      fetchAndRender(`/verify/latest?limit=${limit}`);
    });

    document.getElementById("btnUserRows").addEventListener("click", () => {
      const userId = userIdInput.value.trim();
      if (!userId) {
        setStatus("user_id を入力してください", true);
        return;
      }
      fetchAndRender(`/verify/user/${encodeURIComponent(userId)}`);
    });

    document.getElementById("btnUserCsv").addEventListener("click", async () => {
      const userId = userIdInput.value.trim();
      if (!userId) {
        setStatus("user_id を入力してください", true);
        return;
      }
      setStatus("CSV作成中...");
      try {
        const res = await fetch(`${apiBase}/verify/user/${encodeURIComponent(userId)}`);
        const data = await res.json();
        if (!res.ok) {
          setStatus(`取得失敗: HTTP ${res.status}`, true);
          return;
        }
        const rows = Array.isArray(data.rows) ? data.rows : [];
        if (rows.length === 0) {
          setStatus("対象データがありません", true);
          return;
        }
        const csv = toCsv(rows);
        const guideRows = buildGuideRows(rows);
        const guideCsv = toCsv(guideRows);
        const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
        downloadCsv(`form0_legacy_${userId}_${timestamp}.csv`, csv);
        downloadCsv(`form0_legacy_${userId}_${timestamp}_guide.csv`, guideCsv);
        setStatus(`CSV保存完了（データ${rows.length}件 + カラム説明）`);
      } catch (error) {
        setStatus(`CSV作成失敗: ${error}`, true);
      }
    });

    document.getElementById("btnRoundStatus").addEventListener("click", () => {
      const userId = userIdInput.value.trim();
      if (!userId) {
        setStatus("user_id を入力してください", true);
        return;
      }
      fetchAndRender(`/verify/round-status/${encodeURIComponent(userId)}`);
    });

    document.getElementById("btnConsistency").addEventListener("click", () => {
      const userId = userIdInput.value.trim();
      if (!userId) {
        setStatus("user_id を入力してください", true);
        return;
      }
      fetchAndRender(`/verify/consistency/${encodeURIComponent(userId)}`);
    });
  </script>
</body>
</html>
